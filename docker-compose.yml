services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  postgres-restaurant:
    image: postgres:16-alpine
    container_name: postgres-restaurant
    environment:
      POSTGRES_DB: restaurant_db
      POSTGRES_USER: restaurant_user
      POSTGRES_PASSWORD: restaurant_pass
    ports:
      - "5331:5432"
    volumes:
      - pg-restaurant-data:/var/lib/postgresql/data

  postgres-order:
    image: postgres:16-alpine
    container_name: postgres-order
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_pass
    ports:
      - "5332:5432"
    volumes:
      - pg-order-data:/var/lib/postgresql/data

  postgres-delivery:
    image: postgres:16-alpine
    container_name: postgres-delivery
    environment:
      POSTGRES_DB: delivery_db
      POSTGRES_USER: delivery_user
      POSTGRES_PASSWORD: delivery_pass
    ports:
      - "5333:5432"
    volumes:
      - pg-delivery-data:/var/lib/postgresql/data

  postgres-user:
    image: postgres:16-alpine
    container_name: postgres-user
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_user
      POSTGRES_PASSWORD: user_pass
    ports:
      - "5334:5432"
    volumes:
      - pg-user-data:/var/lib/postgresql/data

  restaurantService:
    image: deliveryhub-restaurant-service
    build:
      context: .
      dockerfile: ./restaurantService/Dockerfile
    container_name: restaurantService
    ports:
      - "3331:3331"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - postgres-restaurant
      - kafka

  orderService:
    image: deliveryhub-order-service
    build:
      context: .
      dockerfile: ./orderService/Dockerfile
    container_name: orderService
    ports:
      - "3332:3332"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - postgres-order
      - kafka
      - restaurantService

  deliveryService:
    image: deliveryhub-delivery-service
    build:
      context: .
      dockerfile: ./deliveryService/Dockerfile
    container_name: deliveryService
    ports:
      - "3333:3333"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - postgres-delivery
      - kafka

  userService:
    image: deliveryhub-user-service
    build:
      context: .
      dockerfile: ./userService/Dockerfile
    container_name: userService
    ports:
      - "3334:3334"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - postgres-user

  apiGateway:
    image: deliveryhub-api-gateway
    build:
      context: .
      dockerfile: ./apiGateway/Dockerfile
    container_name: apiGateway
    ports:
      - "3335:3335"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - restaurantService
      - orderService
      - deliveryService
      - userService

volumes:
  pg-restaurant-data:
  pg-order-data:
  pg-delivery-data:
  pg-user-data: