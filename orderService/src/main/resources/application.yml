server:
  port: 3332

spring:
  application:
    name: orderService
  datasource:
    url: jdbc:postgresql://localhost:5332/order_db
    username: order_user
    password: order_pass
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

app:
  restaurantService:
    url: http://localhost:3331

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html