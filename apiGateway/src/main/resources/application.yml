server:
  port: 3335

app:
  jwt:
    secret: "this-is-a-very-secret-key-for-jwt-signing-must-be-long-enough-512bits"

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: restaurant-service
          uri: http://localhost:3331
          predicates:
            - Path=/api/restaurants/**
        - id: order-service
          uri: http://localhost:3332
          predicates:
            - Path=/api/orders/**
        - id: delivery-service
          uri: http://localhost:3333
          predicates:
            - Path=/api/deliveries/**
        - id: user-service
          uri: http://localhost:3334
          predicates:
            - Path=/api/auth/**
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

springdoc:
  swagger-ui:
    urls:
      - name: restaurant-service
        url: /api/restaurants/v3/api-docs
      - name: order-service
        url: /api/orders/v3/api-docs
      - name: delivery-service
        url: /api/deliveries/v3/api-docs
      - name: user-service
        url: /api/auth/v3/api-docs